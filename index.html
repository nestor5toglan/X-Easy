<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-EASY | Static SaaS Ecosystem</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #3b82f6; }
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
        .rtl { font-family: 'Noto Sans Arabic', sans-serif; }
        .glass { backdrop-filter: blur(12px); background-color: rgba(255, 255, 255, 0.7); }
        .dark .glass { background-color: rgba(0, 0, 0, 0.7); }
        .border-premium { border-color: rgba(226, 232, 240, 0.8); }
        .dark .border-premium { border-color: rgba(30, 41, 59, 0.5); }
        [v-cloak] { display: none; }
    </style>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#000000',
                        darkCard: '#0a0a0a',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white dark:bg-darkBg text-slate-900 dark:text-slate-100 min-h-screen overflow-hidden">

<div id="app" v-cloak :dir="isRTL ? 'rtl' : 'ltr'" :class="{ 'rtl': isRTL }">
    <div class="fixed bottom-6 right-6 z-[100] flex flex-col gap-3">
        <transition-group name="list">
            <div v-for="toast in toasts" :key="toast.id" 
                 class="px-4 py-3 rounded-lg shadow-2xl border border-premium glass flex items-center gap-3 min-w-[280px] animate-bounce-in">
                <i :data-lucide="toast.icon" :class="toast.color"></i>
                <span class="text-sm font-medium">{{ toast.msg }}</span>
            </div>
        </transition-group>
    </div>

    <div class="flex h-screen">
        <aside :class="[isCollapsed ? 'w-20' : 'w-64']" 
               class="flex flex-col border-r border-premium bg-white dark:bg-darkBg transition-all duration-300 z-50">
            <div class="p-6 flex items-center justify-between">
                <h1 v-if="!isCollapsed" class="font-bold text-xl tracking-tighter uppercase">X-Easy</h1>
                <button @click="isCollapsed = !isCollapsed" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-900 rounded-md">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
            </div>

            <nav class="flex-1 px-4 py-4 space-y-2">
                <div v-for="item in menu" :key="item.id" 
                     @click="activeTab = item.id"
                     :class="[activeTab === item.id ? 'bg-slate-100 dark:bg-slate-900 text-blue-500' : 'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-900/50']"
                     class="flex items-center p-3 rounded-xl cursor-pointer transition-colors group">
                    <i :data-lucide="item.icon" class="w-5 h-5"></i>
                    <span v-if="!isCollapsed" class="mx-3 text-sm font-semibold tracking-tight">{{ t(item.label) }}</span>
                </div>
            </nav>

            <div class="p-4 border-t border-premium">
                <button @click="showDonation = true" class="w-full flex items-center justify-center p-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white transition-all">
                    <i data-lucide="heart" class="w-4 h-4 mr-2"></i>
                    <span v-if="!isCollapsed" class="text-xs font-bold">{{ t('donate') }}</span>
                </button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col relative overflow-hidden">
            <header class="h-16 border-b border-premium glass flex items-center justify-between px-8 z-40">
                <div class="flex items-center bg-slate-100 dark:bg-slate-900 rounded-full px-4 py-1.5 w-80">
                    <i data-lucide="search" class="w-4 h-4 text-slate-400"></i>
                    <input type="text" :placeholder="t('search')" class="bg-transparent border-none focus:ring-0 text-sm ml-2 w-full">
                    <span class="text-[10px] font-bold text-slate-500 bg-white dark:bg-black px-1.5 py-0.5 rounded border border-premium">⌘K</span>
                </div>

                <div class="flex items-center gap-4">
                    <select v-model="lang" class="bg-transparent border-none text-xs font-bold focus:ring-0 cursor-pointer">
                        <option value="fr">FR</option>
                        <option value="en">EN</option>
                        <option value="ar">AR</option>
                    </select>
                    <button @click="toggleTheme" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-900 rounded-full transition-transform active:rotate-12">
                        <i :data-lucide="isDark ? 'sun' : 'moon'" class="w-5 h-5"></i>
                    </button>
                    <div class="h-8 w-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 ring-2 ring-premium"></div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-8 relative">
                <div class="max-w-5xl mx-auto">
                    <div class="flex items-center justify-between mb-10">
                        <div>
                            <h2 class="text-3xl font-bold tracking-tighter">{{ t('welcome') }}</h2>
                            <p class="text-slate-500 mt-1">{{ t('subtitle') }}</p>
                        </div>
                        <button @click="addNotification" class="px-5 py-2.5 bg-black dark:bg-white dark:text-black text-white rounded-full text-sm font-bold shadow-lg hover:scale-105 transition-transform">
                            {{ t('action') }}
                        </button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div v-for="i in 3" :key="i" class="p-6 rounded-2xl border border-premium bg-white dark:bg-darkCard hover:shadow-xl transition-shadow">
                            <div class="w-10 h-10 rounded-lg bg-blue-500/10 flex items-center justify-center mb-4">
                                <i data-lucide="activity" class="text-blue-500"></i>
                            </div>
                            <h3 class="font-bold mb-2">Metric 0{{i}}</h3>
                            <div class="h-2 w-full bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                                <div class="h-full bg-blue-500" :style="{ width: (i*25) + '%' }"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div v-if="showDonation" class="fixed inset-0 z-[200] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="showDonation = false"></div>
        <div class="relative bg-white dark:bg-darkCard border border-premium p-8 rounded-3xl max-w-md w-full shadow-2xl scale-in">
            <h3 class="text-2xl font-bold mb-4 tracking-tight">Supporter X-EASY</h3>
            <p class="text-slate-500 mb-6 leading-relaxed">Cet écosystème est maintenu bénévolement pour la communauté. Votre aide permet de garder le projet "Serverless".</p>
            <a href="https://paypal.me/toglanyaonestorpro" target="_blank" 
               class="block w-full text-center py-4 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-700 transition-all">
                PayPal.me
            </a>
            <button @click="showDonation = false" class="w-full mt-3 text-sm text-slate-400 hover:text-slate-600">Peut-être plus tard</button>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, computed, onMounted, watch } = Vue;

    createApp({
        setup() {
            // -- State --
            const isDark = ref(true);
            const lang = ref('fr');
            const isCollapsed = ref(false);
            const activeTab = ref('dashboard');
            const showDonation = ref(false);
            const toasts = ref([]);

            // -- Translations --
            const i18n = {
                fr: { welcome: 'Centre de Commande', subtitle: 'Gérez vos outils statiques en un clic.', search: 'Rechercher...', action: 'Nouvelle Analyse', donate: 'Faire un don' },
                en: { welcome: 'Command Center', subtitle: 'Manage your static tools with one click.', search: 'Search...', action: 'New Analysis', donate: 'Support Us' },
                ar: { welcome: 'مركز القيادة', subtitle: 'إدارة أدواتك الثابتة بنقرة واحدة.', search: 'بحث...', action: 'تحليل جديد', donate: 'تبرع الآن' }
            };

            const t = (key) => i18n[lang.value][key] || key;
            const isRTL = computed(() => lang.value === 'ar');

            // -- Actions --
            const toggleTheme = () => {
                isDark.value = !isDark.value;
                document.documentElement.classList.toggle('dark');
            };

            const addNotification = () => {
                const id = Date.now();
                toasts.value.push({ id, msg: 'Données synchronisées !', icon: 'check-circle', color: 'text-green-500' });
                setTimeout(() => {
                    toasts.value = toasts.value.filter(t => t.id !== id);
                }, 3000);
            };

            // -- Lifecycle --
            onMounted(() => {
                lucide.createIcons();
                // Simulation Cmd+K focus
                window.addEventListener('keydown', (e) => {
                    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                        e.preventDefault();
                        document.querySelector('input').focus();
                    }
                });
            });

            watch([isDark, lang, isCollapsed, activeTab, toasts, showDonation], () => {
                setTimeout(() => lucide.createIcons(), 10);
            }, { deep: true });

            return {
                isDark, lang, isCollapsed, activeTab, showDonation, toasts,
                t, isRTL, toggleTheme, addNotification,
                menu: [
                    { id: 'dashboard', label: 'welcome', icon: 'layout-dashboard' },
                    { id: 'audit', label: 'action', icon: 'shield-check' },
                    { id: 'settings', label: 'search', icon: 'settings' }
                ]
            }
        }
    }).mount('#app');
</script>

<style>
    /* Animations minimalistes */
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .scale-in { animation: scaleIn 0.2s ease-out; }
    .list-enter-active, .list-leave-active { transition: all 0.4s ease; }
    .list-enter-from { opacity: 0; transform: translateX(30px); }
    .list-leave-to { opacity: 0; transform: scale(0.5); }
</style>
</body>
</html>
